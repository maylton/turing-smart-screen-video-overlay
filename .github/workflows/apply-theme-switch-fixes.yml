name: Apply theme switch corrections

on:
  pull_request:
    branches:
      - feature/theme-editor-text-effect-presets
    paths:
      - tools/apply_theme_switch_fixes.py
      - .github/workflows/apply-theme-switch-fixes.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/theme-engine-composition-presets
          fetch-depth: 0

      - name: Apply corrections
        run: python3 tools/apply_theme_switch_fixes.py

      - name: Validate
        run: |
          python3 -m py_compile theme-editor-gtk.py
          python3 -m unittest -v tests.test_theme_component_presets tests.test_theme_composition_presets
          git diff --check

      - name: Commit corrected editor
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Fix theme switching consistency
          branch: feature/theme-engine-composition-presets
          file_pattern: theme-editor-gtk.py
