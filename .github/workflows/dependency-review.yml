# Dependency Review Action
#
# Dependency Review and GitHub Code Scanning require GitHub Advanced Security
# for private repositories. Keep this workflow active for public repositories,
# and allow private repositories to opt in after GHAS is enabled by setting the
# repository variable ENABLE_GHAS_CHECKS=true.
name: 'Dependency Review'
on: [pull_request]

permissions:
  contents: read

jobs:
  dependency-review:
    name: 'Dependency Review'
    if: ${{ github.event.repository.visibility == 'public' || vars.ENABLE_GHAS_CHECKS == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v7
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v5
