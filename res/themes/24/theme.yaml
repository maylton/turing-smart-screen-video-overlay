author: "@mathoudebine"

display:
  DISPLAY_SIZE: 2.1"
  DISPLAY_ORIENTATION: landscape
  DISPLAY_RGB_LED: 236, 214, 180

video:
  ENABLED: true
  MODE: native
  PATH: /mnt/SDCARD/video/frieren.mp4
  OVERLAY: true

  INTERVAL: 0
static_images:
  # Transparent overlay extracted from the Windows .turtheme.
  # Contains the TIME title and the bottom decorative arc.
  UI_OVERLAY:
    PATH: ui_overlay.png
    X: 0
    Y: 0
    WIDTH: 480
    HEIGHT: 480

static_text:
  CPUTEMP_LABEL:
    TEXT: "TEMP. CPU"
    X: 140
    Y: 270
    WIDTH: 240
    HEIGHT: 24
    FONT: roboto/Roboto-Black.ttf
    FONT_SIZE: 14
    FONT_COLOR: [255, 255, 255]
    BACKGROUND_IMAGE: transparent.png
    ALIGN: left
    ANCHOR: lt

    EFFECTS:
      SHADOW:
        ENABLED: false
        COLOR:
          - 0
          - 0
          - 0
          - 180
        OFFSET_X: 3
        OFFSET_Y: 3
        BLUR_RADIUS: 4.0
      GLOW:
        ENABLED: true
        COLOR:
          - 80
          - 180
          - 255
          - 210
        BLUR_RADIUS: 10.0
        INTENSITY: 3
      OUTLINE:
        ENABLED: false
        COLOR:
          - 0
          - 0
          - 0
          - 255
        WIDTH: 2
STATS:
  CPU:
    PERCENTAGE:
      INTERVAL: 5
      TEXT:
        SHOW: false
        SHOW_UNIT: true
        X: 270
        Y: 265
        FONT: jetbrains-mono/JetBrainsMono-Light.ttf
        FONT_SIZE: 26
        FONT_COLOR: 255, 255, 255
        BACKGROUND_IMAGE: background.png
      GRAPH:
        SHOW: true
        X: 143
        Y: 295
        WIDTH: 192
        HEIGHT: 9
        MIN_VALUE: 0
        MAX_VALUE: 100
        BAR_COLOR: 236, 214, 180
        BAR_OUTLINE: false
        BACKGROUND_COLOR: 255, 255, 255

    TEMPERATURE:
      INTERVAL: 5
      TEXT:
        SHOW: true
        SHOW_UNIT: true
        X: 275
        Y: 270
        WIDTH: 95
        HEIGHT: 36
        FONT: roboto/Roboto-Black.ttf
        FONT_SIZE: 25
        FONT_COLOR: 255, 255, 255
        BACKGROUND_IMAGE: background.png
        ALIGN: left
        ANCHOR: lt
  DATE:
    INTERVAL: 1
    HOUR: # Format (12/24h, timezone translations) will match your computer locale
      TEXT:
        FORMAT: short # short (6:48 PM) / medium (6:48:53 PM) / long (6:48:53 PM UTC) / full (6:48:53 PM Coordinated Universal Time)
        SHOW: true
        X: 26
        Y: 141
        WIDTH: 428
        HEIGHT: 103
        ANCHOR: mm
        FONT: roboto-mono/RobotoMono-Bold.ttf
        FONT_SIZE: 112
        FONT_COLOR: 255, 255, 255
        BACKGROUND_IMAGE: background.png

